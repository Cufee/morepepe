name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload zip to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest public/emojis/morepepe-all.zip \
            --title "All emojis" \
            --notes "Download all emojis as a zip archive." \
            --latest

      - name: Remove zip from build output
        run: rm dist/emojis/morepepe-all.zip

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=morepepe
